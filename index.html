function draw(){
  // カメラシェイク
  ctx.save();
  if(shake>0.3){
    var sx=(Math.random()-0.5)*shake;
    var sy=(Math.random()-0.5)*shake;
    ctx.translate(sx,sy);
  }
  // ===== 背景（ワールド別テーマ：10ワールドを5背景に割り当て）=====
  // W1,2→草原 / W3,4→夕 / W5,6→洞窟 / W7,8→雪 / W9,10→宇宙
  var _w=stageWorld(level);
  var bgPat=(_w<=2)?1:(_w<=4)?2:(_w<=6)?3:(_w<=8)?4:5;
  if(bgPat===1){
    // LV1：昼の草原・多層パララックスで立体的な奥行き
    // ① 空（柔らかな上→下グラデ＋上空のほのかな光）
    var skyG=ctx.createLinearGradient(0,0,0,H);
    skyG.addColorStop(0,'#4aa8ee');skyG.addColorStop(0.55,'#7fc8f5');skyG.addColorStop(1,'#d6f0ff');
    ctx.fillStyle=skyG;ctx.fillRect(0,0,W,H);
    // ② 太陽（やわらかい光輪）
    var sunX=64,sunY=52;
    var sunG=ctx.createRadialGradient(sunX,sunY,6,sunX,sunY,60);
    sunG.addColorStop(0,'rgba(255,248,200,0.9)');sunG.addColorStop(0.3,'rgba(255,228,120,0.5)');sunG.addColorStop(1,'rgba(255,228,120,0)');
    ctx.fillStyle=sunG;ctx.beginPath();ctx.arc(sunX,sunY,60,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff3b0';ctx.beginPath();ctx.arc(sunX,sunY,20,0,Math.PI*2);ctx.fill();
    // ③ 最遠景：青く霞む山脈（パララックス最小 cam*0.04）
    var mtnBase=GROUND-30;
    for(var L1=0;L1<2;L1++){
      ctx.fillStyle=L1===0?'rgba(150,195,225,0.55)':'rgba(120,175,210,0.65)';
      var off=L1*130;
      for(var mi1=0;mi1<6;mi1++){
        var mx1=((mi1*260+off-cam*(0.04+L1*0.02))%(W+520)+W+520)%(W+520)-260;
        var mh1=70+((mi1*53+L1*40)%60);
        ctx.beginPath();
        ctx.moveTo(mx1-130,mtnBase);
        ctx.quadraticCurveTo(mx1-60,mtnBase-mh1*0.7,mx1,mtnBase-mh1);
        ctx.quadraticCurveTo(mx1+60,mtnBase-mh1*0.7,mx1+130,mtnBase);
        ctx.closePath();ctx.fill();
      }
    }
    // ④ 遠い雲（小さく薄く・ゆっくり cam*0.06＋自走）
    ctx.fillStyle='rgba(255,255,255,0.55)';
    for(var ci0=0;ci0<3;ci0++){
      var cxa=((ci0*240+fr*0.18-cam*0.06)%(W+200)+W+200)%(W+200)-100;
      var cya=40+ci0*22;
      ctx.beginPath();ctxEllipse(ctx,cxa,cya,30,11,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctxEllipse(ctx,cxa+20,cya-6,20,9,0,0,Math.PI*2);ctx.fill();
    }
    // ⑤ 中景：なだらかな緑の丘（陰影付き・立体 cam*0.13）
    for(var hi=0;hi<6;hi++){
      var hx=((hi*230-cam*0.13)%(W+460)+W+460)%(W+460)-230;
      var hr=110+(hi*37%50);
      // 丘本体
      var hg=ctx.createLinearGradient(hx,GROUND-hr,hx,GROUND+20);
      hg.addColorStop(0,'#8fd06a');hg.addColorStop(1,'#5aa83e');
      ctx.fillStyle=hg;
      ctx.beginPath();ctx.arc(hx,GROUND+20,hr,Math.PI,0);ctx.fill();
      // 丘の右側に陰（立体感）
      ctx.fillStyle='rgba(40,110,40,0.25)';
      ctx.beginPath();ctx.arc(hx,GROUND+20,hr,Math.PI*1.6,0);ctx.fill();
      // 丘のてっぺんハイライト
      ctx.fillStyle='rgba(200,255,180,0.4)';
      ctx.beginPath();ctx.arc(hx-hr*0.3,GROUND+20,hr*0.92,Math.PI*1.15,Math.PI*1.45);ctx.fill();
    }
    // ⑥ 近景：立体的な木立（丸い樹冠＋幹＋陰 cam*0.28）
    for(var ti2=0;ti2<5;ti2++){
      var tx2=((ti2*320+90-cam*0.28)%(W+640)+W+640)%(W+640)-320;
      var ty2=GROUND-6, trH=26;
      // 幹
      ctx.fillStyle='#7a4a28';ctx.fillRect(tx2-4,ty2-trH,8,trH);
      ctx.fillStyle='rgba(0,0,0,0.18)';ctx.fillRect(tx2+1,ty2-trH,3,trH);
      // 樹冠（3つの円で雲状＋陰影）
      var crownY=ty2-trH-10;
      var cg=ctx.createRadialGradient(tx2-6,crownY-6,4,tx2,crownY,30);
      cg.addColorStop(0,'#6fc04a');cg.addColorStop(1,'#3a8a2a');
      ctx.fillStyle=cg;
      ctx.beginPath();ctx.arc(tx2-14,crownY+4,16,0,Math.PI*2);
      ctx.arc(tx2+14,crownY+4,16,0,Math.PI*2);
      ctx.arc(tx2,crownY-8,19,0,Math.PI*2);ctx.fill();
      // 樹冠ハイライト
      ctx.fillStyle='rgba(190,240,150,0.45)';
      ctx.beginPath();ctx.arc(tx2-6,crownY-12,7,0,Math.PI*2);ctx.fill();
    }
    // ⑦ 前景の茂み（地面手前で速く流れる cam*0.55）
    for(var bi=0;bi<7;bi++){
      var bx=((bi*180+40-cam*0.55)%(W+360)+W+360)%(W+360)-180;
      var bg3=ctx.createLinearGradient(bx,GROUND-14,bx,GROUND+6);
      bg3.addColorStop(0,'#4fa83a');bg3.addColorStop(1,'#2d7a22');
      ctx.fillStyle=bg3;
      ctx.beginPath();
      ctx.arc(bx-10,GROUND+2,11,Math.PI,0);
      ctx.arc(bx+2,GROUND+2,14,Math.PI,0);
      ctx.arc(bx+14,GROUND+2,10,Math.PI,0);
      ctx.fill();
    }

  } else if(bgPat===2){
    // LV2：夕暮れ・オレンジ空・少し緊張感
    var skyG2=ctx.createLinearGradient(0,0,0,H);
    skyG2.addColorStop(0,'#1a1a3e');skyG2.addColorStop(0.5,'#c84b11');skyG2.addColorStop(1,'#ff9a3c');
    ctx.fillStyle=skyG2;ctx.fillRect(0,0,W,H);
    // 星（少し見える）
    for(var si=0;si<20;si++){
      var sx2=(Math.sin(si*137.5)*.5+.5)*W;
      var sy2=(Math.cos(si*97.3)*.5+.5)*(H*.4);
      ctx.globalAlpha=0.1+Math.sin(fr*.04+si)*.35;
      ctx.fillStyle='#fff';ctx.fillRect(Math.floor(sx2),Math.floor(sy2),2,2);
    }
    ctx.globalAlpha=1;
    // 夕日
    ctx.fillStyle='#ffcc44';ctx.shadowColor='#ff8800';ctx.shadowBlur=30;
    ctx.beginPath();ctx.arc(W-60,GROUND-20,28,Math.PI,0);ctx.fill();
    ctx.shadowBlur=0;
    // 薄暗い山シルエット
    ctx.fillStyle='rgba(40,10,0,0.7)';
    for(var mi=0;mi<5;mi++){
      var mx=((mi*200-cam*0.12)%(W+200)+W+200)%(W+200)-100;
      var mh=60+mi*20%50;
      ctx.beginPath();ctx.moveTo(mx,GROUND);ctx.lineTo(mx+100,GROUND-mh);ctx.lineTo(mx+200,GROUND);ctx.fill();
    }

  } else if(bgPat===3){
    // LV3：夜の山岳・暗め・緊張感高まる
    var skyG3=ctx.createLinearGradient(0,0,0,H);
    skyG3.addColorStop(0,'#050510');skyG3.addColorStop(1,'#1a1040');
    ctx.fillStyle=skyG3;ctx.fillRect(0,0,W,H);
    // 星（たくさん）
    for(var si3=0;si3<50;si3++){
      var sx3=(Math.sin(si3*137.5)*.5+.5)*W;
      var sy3=(Math.cos(si3*97.3)*.5+.5)*(H*.6);
      ctx.globalAlpha=0.2+Math.sin(fr*.05+si3)*.5;
      ctx.fillStyle='#fff';ctx.fillRect(Math.floor(sx3),Math.floor(sy3),si3%5===0?2:1,si3%5===0?2:1);
    }
    ctx.globalAlpha=1;
    // 月
    ctx.fillStyle='#fffde0';ctx.shadowColor='#ffffaa';ctx.shadowBlur=18;
    ctx.beginPath();ctx.arc(W-55,40,20,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#050510';ctx.shadowBlur=0;
    ctx.beginPath();ctx.arc(W-46,35,15,0,Math.PI*2);ctx.fill();
    // 険しい山
    ctx.fillStyle='rgba(15,10,40,0.8)';
    for(var mi3=0;mi3<6;mi3++){
      var mx3=((mi3*160-cam*0.15)%(W+160)+W+160)%(W+160)-80;
      var mh3=65+mi3*25%55;
      ctx.beginPath();ctx.moveTo(mx3,GROUND);ctx.lineTo(mx3+80,GROUND-mh3);ctx.lineTo(mx3+160,GROUND);ctx.fill();
    }

  } else if(bgPat===4){
    // LV4：溶岩・地下洞窟・赤黒い危険な雰囲気
    var skyG4=ctx.createLinearGradient(0,0,0,H);
    skyG4.addColorStop(0,'#0a0000');skyG4.addColorStop(0.7,'#1a0500');skyG4.addColorStop(1,'#3a0800');
    ctx.fillStyle=skyG4;ctx.fillRect(0,0,W,H);
    // 溶岩の光（下から揺らめく赤い光）
    var lavaGlow=ctx.createRadialGradient(W/2,H,0,W/2,H,200);
    lavaGlow.addColorStop(0,'rgba(255,60,0,0.35)');
    lavaGlow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=lavaGlow;ctx.fillRect(0,0,W,H);
    // 飛び散る火の粉
    for(var fi2=0;fi2<18;fi2++){
      var ft=(fr*0.8+fi2*23)%120;
      var fx2=((fi2*137+cam*0.1)%W);
      var fy2=GROUND-ft*2.5;
      if(fy2<0) continue;
      ctx.globalAlpha=(1-ft/120)*0.7;
      ctx.fillStyle=fi2%3===0?'#ff6600':fi2%3===1?'#ffcc00':'#ff2200';
      ctx.beginPath();ctx.arc(fx2,fy2,1.5,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
    // 鍾乳石（天井から）
    ctx.fillStyle='rgba(40,5,0,0.8)';
    for(var di=0;di<7;di++){
      var dx=((di*170-cam*0.2)%(W+170)+W+170)%(W+170)-85;
      var dh=25+di*12%30;
      ctx.beginPath();ctx.moveTo(dx,0);ctx.lineTo(dx-12,dh);ctx.lineTo(dx+12,dh);ctx.fill();
    }

  } else {
    // LV5：深宇宙・最終決戦・黒紫・威圧感MAX
    var skyG5=ctx.createLinearGradient(0,0,0,H);
    skyG5.addColorStop(0,'#000000');skyG5.addColorStop(0.5,'#0d0020');skyG5.addColorStop(1,'#1a0035');
    ctx.fillStyle=skyG5;ctx.fillRect(0,0,W,H);
    // 星雲（大きな光の塊）
    ctx.fillStyle='rgba(80,0,120,0.12)';
    ctx.beginPath();ctxEllipse(ctx,W*0.3,H*0.3,100,60,0.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(0,60,120,0.1)';
    ctx.beginPath();ctxEllipse(ctx,W*0.7,H*0.2,80,50,-0.3,0,Math.PI*2);ctx.fill();
    // 星（密度高・色付き）
    for(var si5=0;si5<70;si5++){
      var sx5=(Math.sin(si5*137.5)*.5+.5)*W;
      var sy5=(Math.cos(si5*97.3)*.5+.5)*(H*.75);
      var sc=['#fff','#ffccff','#ccccff','#ff88ff'][si5%4];
      ctx.globalAlpha=0.15+Math.sin(fr*.04+si5)*.5;
      ctx.fillStyle=sc;ctx.fillRect(Math.floor(sx5),Math.floor(sy5),si5%7===0?2:1,si5%7===0?2:1);
    }
    ctx.globalAlpha=1;
    // 不気味な惑星
    ctx.fillStyle='#220033';ctx.shadowColor='#8800cc';ctx.shadowBlur=25;
    ctx.beginPath();ctx.arc(80,55,30,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(150,0,200,0.15)';
    ctx.beginPath();ctxEllipse(ctx,80,55,55,12,0,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    // 稲妻のような亀裂
    if(fr%90<3){
      ctx.strokeStyle='rgba(180,0,255,0.6)';ctx.lineWidth=1.5;
      ctx.beginPath();
      var lx5=Math.random()*W;
      ctx.moveTo(lx5,0);ctx.lineTo(lx5+20,60);ctx.lineTo(lx5-10,120);ctx.lineTo(lx5+15,180);
      ctx.stroke();
    }
  }

  // ===== 背景テーマ着色（アンロックした背景で雰囲気チェンジ）=====
  if(equippedBG!=='grass'){
    var th=getBGTheme();
    // 空エリア（地面より上）にテーマグラデを重ねて雰囲気を変える
    var tg=ctx.createLinearGradient(0,0,0,GROUND);
    tg.addColorStop(0,'rgba('+hexToRgb(th.sky[0])+',0.78)');
    tg.addColorStop(0.55,'rgba('+hexToRgb(th.sky[1])+',0.62)');
    tg.addColorStop(1,'rgba('+hexToRgb(th.sky[2])+',0.30)');
    ctx.fillStyle=tg; ctx.fillRect(0,0,W,GROUND);
    // 夜は星を散らす
    if(equippedBG==='night'){
      ctx.fillStyle='rgba(255,255,255,0.85)';
      for(var st=0;st<24;st++){
        var stx=((st*167+fr*0.05)%(W+40))-20;
        var sty=(st*97)%(GROUND-90)+10;
        var tw=0.6+Math.abs(Math.sin(fr*0.03+st))*1.2;
        ctx.globalAlpha=0.4+Math.abs(Math.sin(fr*0.04+st*1.7))*0.5;
        ctx.fillRect(stx,sty,tw,tw);
      }
      ctx.globalAlpha=1;
    }
    // 雪は舞う雪片
    if(equippedBG==='snow'){
      ctx.fillStyle='rgba(255,255,255,0.9)';
      for(var sf=0;sf<30;sf++){
        var sfx=((sf*131+fr*0.4)%(W+30))-15;
        var sfy=((sf*83+fr*1.1)%(GROUND-20));
        ctx.beginPath();ctx.arc(sfx,sfy,1.3+((sf*7)%2),0,Math.PI*2);ctx.fill();
      }
    }
  }
  // 足場・地面
  for(var ti=0;ti<tiles.length;ti++){
    var t=tiles[ti];
    var tx=t.x-cam;
    if(tx>W+60||tx+t.w<-60)continue;
    if(t.goal){
      // ゴールポール
      ctx.fillStyle='#888';ctx.fillRect(tx,t.y,4,t.h);
      // 旗
      ctx.fillStyle='#ff4444';
      ctx.beginPath();ctx.moveTo(tx+4,t.y);ctx.lineTo(tx+28,t.y+10);ctx.lineTo(tx+4,t.y+20);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.8)';ctx.font='bold 9px monospace';
      ctx.fillText('GOAL',tx-10,t.y-5);
    } else if(t.g){
      // 地面本体（軽量：単色＋下部陰影バンド）
      // ★以前は[level-1]で5要素しかなく、stage6以降でundefined色になり
      //   地面が透けて見えていた（⑥の原因）。ワールド(1-10)単位で参照し、
      //   範囲外にならないようclampする。
      var _gw=Math.min(10,Math.max(1,stageWorld(level)))-1;
      var gndCol =['#2d6a4f','#5a3a1a','#1a2a40','#3a4a58','#5a1a10','#3a0a28','#0d3a3a','#3a1010','#3a0830','#3a3010'][_gw];
      var gndBot =['#1a4030','#3a2410','#0e1825','#243640','#3a1008','#240618','#062424','#240808','#240420','#241e08'][_gw];
      var topCol =['#52b788','#9a6a30','#3a5a80','#6a8aa8','#aa3322','#7a3068','#1aa0a0','#aa3030','#aa3088','#aa9030'][_gw];
      var topLit =['#6dd89e','#bb8a44','#5278a8','#8aaac8','#cc5533','#9a4088','#3ac0c0','#cc4444','#cc44aa','#ccaa44'][_gw];
      ctx.fillStyle=gndCol;ctx.fillRect(tx,t.y,t.w,H-(t.y)+2);
      // 下部に陰影バンド（奥行き感・グラデの代わり）
      ctx.fillStyle=gndBot;ctx.fillRect(tx,t.y+40,t.w,H-(t.y)-38);
      // 草・表面（明るいハイライトライン付き）
      ctx.fillStyle=topCol;ctx.fillRect(tx,t.y,t.w,5);
      ctx.fillStyle=topLit;ctx.fillRect(tx,t.y,t.w,2);
      // 草の毛先（W1-2のみ）
      if(stageWorld(level)<=2){
        ctx.fillStyle=topCol;
        for(var gr=0;gr<t.w;gr+=8){
          var gh2=3+((tx+gr)%3);
          ctx.beginPath();
          ctx.moveTo(tx+gr,t.y);ctx.lineTo(tx+gr+2,t.y-gh2);ctx.lineTo(tx+gr+4,t.y);
          ctx.fill();
        }
      }
    } else if(t.side){
      // 段差崖面（ワールド色に合わせる）
      var _sw=Math.min(10,Math.max(1,stageWorld(level)))-1;
      ctx.fillStyle=['#1a4a30','#3a2410','#0e1825','#243640','#3a1008','#240618','#062424','#240808','#240420','#241e08'][_sw];
      ctx.fillRect(tx,t.y,t.w,t.h);
      ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fillRect(tx+1,t.y,t.w-2,t.h);
    } else {
      // 浮き台（軽量：単色＋下部陰影）
      var _pw=Math.min(10,Math.max(1,stageWorld(level)))-1;
      var platCol=['#7a5533','#6a4520','#2a4060','#4a5a68','#661a10','#4a1030','#0d4a4a','#4a1010','#4a1040','#4a4010'][_pw];
      var platDk =['#5a3d22','#4a3010','#1c2c44','#34404a','#440a08','#340a20','#063434','#340808','#340830','#342e08'][_pw];
      var platTop=['#9b7a55','#bb8a50','#4a70a0','#7a90a8','#992200','#7a3068','#1ab0b0','#aa3030','#aa30aa','#aaaa30'][_pw];
      ctx.fillStyle=platCol;ctx.fillRect(tx,t.y,t.w,t.h);
      ctx.fillStyle=platDk;ctx.fillRect(tx,t.y+t.h*0.55,t.w,t.h*0.45);
      ctx.fillStyle=platTop;ctx.fillRect(tx,t.y,t.w,3);
      // 縁のハイライト
      ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(tx,t.y,t.w,1);
      // 影（下に落ちる）
      ctx.fillStyle='rgba(0,0,0,0.12)';ctx.fillRect(tx,t.y+t.h,t.w,3);
    }
  }

  // ゴールまでのプログレスバー
  var prog=Math.min(1,Math.max(0,(p.x-50)/(GOAL_X-50)));
  ctx.fillStyle='rgba(0,0,0,.45)';ctx.fillRect(10,H-8,W-20,5);
  ctx.fillStyle='#ffe44d';ctx.fillRect(10,H-8,(W-20)*prog,5);
  ctx.fillStyle='#fff';ctx.font='8px monospace';
  ctx.fillText('GOAL',W-30,H-9);

  // コイン
  for(var ci=0;ci<cins.length;ci++){
    var c=cins[ci];if(c.got)continue;
    var cx2=c.x-cam;if(cx2<-20||cx2>W+20)continue;
    var by=Math.sin(fr*.1+c.bob)*4;
    // コインの回転アニメ（xScaleで扁平→丸→扁平を繰り返す）
    var spin=Math.abs(Math.cos(fr*.08+c.bob));// 0〜1
    var coinW=Math.max(2,9*spin); // 回転で幅が変わる
    var coinH=11;
    ctx.save();
    ctx.translate(cx2+7, c.y+7+by);
    // グロー
    ctx.shadowColor='#ffe44d';ctx.shadowBlur=8;
    // コイン本体（楕円で3D感）
    ctx.fillStyle='#ffe44d';
    ctx.beginPath();ctxEllipse(ctx,0,0,coinW,coinH,0,0,Math.PI*2);ctx.fill();
    // 側面（回転中）
    if(spin>0.15){
      ctx.fillStyle='#f0b800';
      ctx.beginPath();ctxEllipse(ctx,0,0,coinW*0.6,coinH,0,0,Math.PI*2);ctx.fill();
      // ハイライト
      ctx.fillStyle='#fff8aa';
      ctx.beginPath();ctxEllipse(ctx,-coinW*0.25,-coinH*0.3,coinW*0.25,coinH*0.3,0,0,Math.PI*2);ctx.fill();
    }
    // 正面向き時は「$」マーク
    if(spin>0.6){
      ctx.fillStyle='#c8a800';
      ctx.font='bold '+(coinH*0.9)+'px monospace';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('$',0,1);
    }
    ctx.shadowBlur=0;
    ctx.restore();
  }

  // 敵
  for(var ei=0;ei<enms.length;ei++){
    var e=enms[ei];
    var ex=e.x-cam;if(ex<-60||ex>W+60)continue;
    if(e.dead){
      if(e.dy>0){
        ctx.save();ctx.globalAlpha=e.dy/24;ctx.fillStyle='#ff4444';
        for(var k=0;k<4;k++){var a=k*Math.PI/2+fr*.1,d=24-e.dy;ctx.fillRect(ex+e.w/2+Math.cos(a)*d,e.y+e.h/2+Math.sin(a)*d,4,4);}
        ctx.restore();
      }
      continue;
    }
    var bob=Math.sin(fr*.12+ei)*2;
    ctx.save();ctx.translate(ex+e.w/2,e.y+e.h);
    // ★ドラゴン（ミニ/キング/覚醒）は優先的に3D描画・スプライト画像をスキップ
    // ★敵スプライト描画（まもの図鑑のフィギュア質感に置き換え）
    var spr=ENEMY_SPR[e.type];
    if(e.type==='boss' && e.rage && ENEMY_SPR.boss2) spr=ENEMY_SPR.boss2;
    var isFlyT=(e.type==='fly'||e.type==='bomber'||e.type==='diver');
    var dispH=e.h*(e.type==='boss'?1.16:isFlyT?1.55:1.34);
    var dispW=dispH;
    var flip=(p.x>e.x+e.w/2)?-1:1;
    if(spr && spr.complete && spr.naturalWidth){
      dispW=dispH*(spr.naturalWidth/spr.naturalHeight);
      ctx.save();ctx.translate(0,bob);ctx.scale(flip,1);
      ctx.drawImage(spr,-dispW/2,-dispH,dispW,dispH);
      ctx.restore();
    } else {
      ctx.fillStyle='#c0392b';ctx.beginPath();ctx.arc(0,-e.h*0.5+bob,e.w*0.5,0,Math.PI*2);ctx.fill();
    }
    if(e.type==='boss'){
      var isRageB=e.rage, breathingB=(e.breathTimer>0)||((fr%150)<24);
      if(breathingB){
        ctx.save();ctx.translate(0,bob);ctx.scale(flip,1);
        var bfx=-e.w*0.46, bfy=-e.h*0.62, bAmp=(e.breathTimer>0?1.4:1);
        ctx.shadowColor=isRageB?'#aa00ff':'#ff3300';ctx.shadowBlur=20;ctx.globalAlpha=0.9;
        for(var bk=0;bk<5;bk++){
          ctx.fillStyle=isRageB?(bk%2?'#ff99ff':'#cc44ff'):(bk%2?'#ffdd00':'#ff6a00');
          ctx.beginPath();ctx.arc(bfx-bk*e.w*0.12,bfy+Math.sin(fr*0.3+bk)*3,e.w*(0.15+bk*0.055)*bAmp,0,Math.PI*2);ctx.fill();
        }
        ctx.restore();
      }
      var hbw=e.w*0.95, hbY=-dispH-12+bob, hpR=Math.max(0,e.hp/e.maxHp);
      ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(-hbw/2-2,hbY,hbw+4,9);
      ctx.fillStyle=isRageB?'#cc44ff':'#ff3322';ctx.fillRect(-hbw/2,hbY+2,hbw*hpR,5);
      ctx.fillStyle='#ffd24a';ctx.font='bold 9px sans-serif';ctx.textAlign='center';ctx.textBaseline='alphabetic';
      ctx.fillText((isRageB?'覚醒 ':'BOSS ')+e.hp+'/'+e.maxHp,0,hbY-3);
    }

    // HP表示
    if(e.maxHp>1 && e.type!=='boss'){
      for(var hi=0;hi<e.maxHp;hi++){
        ctx.fillStyle=hi<e.hp?'#2ecc71':'#333';
        ctx.fillRect(-e.w/2+hi*(e.w/e.maxHp)+1,-dispH-8+bob,e.w/e.maxHp-2,3);
      }
    }
    ctx.restore();
  }

  // 爆弾・爆発描画（防御不可）
  for(var boi=0;boi<bombs.length;boi++){
    var bo=bombs[boi];
    var bx=bo.x-cam;
    ctx.save();
    if(bo.exploded){
      var exR=40*(bo.exTimer/20);
      ctx.globalAlpha=Math.max(0,1-bo.exTimer/20);
      ctx.fillStyle='#ff6600';
      ctx.shadowColor='#ff6600';ctx.shadowBlur=20;
      ctx.beginPath();ctx.arc(bx,bo.y,exR,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffcc00';
      ctx.beginPath();ctx.arc(bx,bo.y,exR*0.6,0,Math.PI*2);ctx.fill();
      if(bo.exTimer<8){
        ctx.globalAlpha=0.9;ctx.shadowBlur=0;ctx.fillStyle='#fff';
        ctx.font='bold 11px monospace';ctx.textAlign='center';
        ctx.fillText('NO GUARD!',bx,bo.y-exR-5);
      }
    } else {
      ctx.fillStyle='#2c3e50';
      ctx.beginPath();ctx.arc(bx,bo.y,bo.r,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#f39c12';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(bx,bo.y-bo.r);ctx.lineTo(bx+4,bo.y-bo.r-6);ctx.stroke();
      ctx.fillStyle='#ffe44d';
      ctx.beginPath();ctx.arc(bx+4,bo.y-bo.r-6,2,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }

  // パーティクル（グロー発光付き）
  for(var qi=0;qi<ptcl.length;qi++){
    var q=ptcl[qi];
    var qa=q.life/q.ml;
    ctx.save();
    ctx.globalAlpha=qa;
    ctx.fillStyle=q.col;
    ctx.shadowColor=q.col;
    ctx.shadowBlur=8*qa;
    ctx.beginPath();ctx.arc(q.x-cam,q.y,q.r,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // ドロップアイテム（ハート）描画
  for(var iti=0;iti<items.length;iti++){
    var itd=items[iti];
    var bob=itd.onG?Math.sin(fr*0.1+iti)*3:0;
    var blink=itd.life<120 && Math.floor(itd.life/6)%2===0; // 消滅前点滅
    if(blink) continue;
    ctx.save();
    if(itd.type==='bomb'){
      ctx.shadowColor='#ffcc44'; ctx.shadowBlur=10;
      ctx.font='18px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('💣',itd.x-cam,itd.y+bob);
    } else {
      ctx.shadowColor='#ff4466'; ctx.shadowBlur=10;
      ctx.font='16px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('❤',itd.x-cam,itd.y+bob);
    }
    ctx.restore();
  }
  // ★投げ爆弾
  for(var pbi=0;pbi<pbombs.length;pbi++){
    var PB=pbombs[pbi];
    ctx.save();
    ctx.translate(PB.x-cam,PB.y); ctx.rotate(PB.rot||0);
    ctx.shadowColor='#ffaa00'; ctx.shadowBlur=8;
    ctx.font='16px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('💣',0,0);
    ctx.restore();
  }

  // スコアポップ（撃破時に+100等がふわっと浮く）
  for(var pi2=0;pi2<pops.length;pi2++){
    var po=pops[pi2];
    var pa=Math.min(1,po.life/(po.ml*0.4));
    ctx.save();
    ctx.globalAlpha=pa;
    ctx.font='bold 13px Arial';
    ctx.textAlign='center';
    ctx.lineWidth=3;ctx.strokeStyle='rgba(0,0,0,0.6)';
    ctx.strokeText(po.txt,po.x-cam,po.y);
    ctx.fillStyle=po.col;
    ctx.fillText(po.txt,po.x-cam,po.y);
    ctx.restore();
  }

  // 弾（火・レーザー）
  for(var bi=0;bi<bullets.length;bi++){
    var b=bullets[bi];
    var bx=b.x-cam;
    ctx.save();
    if(b.type==='fire'){
      // 火の玉：オレンジ＋グロー
      ctx.globalAlpha=0.9;
      ctx.fillStyle='#ff6600';
      ctx.shadowColor='#ff4400';ctx.shadowBlur=10;
      ctx.beginPath();ctx.arc(bx,b.y,b.r,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffcc00';
      ctx.beginPath();ctx.arc(bx,b.y,b.r*0.5,0,Math.PI*2);ctx.fill();
    } else {
      // レーザー：青白い線
      ctx.globalAlpha=0.95;
      ctx.strokeStyle='#00eeff';ctx.lineWidth=3;
      ctx.shadowColor='#00eeff';ctx.shadowBlur=12;
      ctx.beginPath();ctx.moveTo(bx-8*Math.sign(b.vx),b.y);ctx.lineTo(bx+8*Math.sign(b.vx),b.y);ctx.stroke();
      ctx.fillStyle='#ffffff';
      ctx.beginPath();ctx.arc(bx,b.y,b.r,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }

  // 棒人間（プレイ中・各種ゲーム状態のみ。タイトル/キャラ選択中は描かない）
  if(gs!=='title' && gs!=='charSelect' && p.skillLv!==undefined){
  // プレイヤーの影（地面に落ちる楕円・接地感）
  (function(){
    var shX=(p.x+pw()/2)-cam;
    var groundBelow=getGroundY(p.x+pw()/2);
    if(groundBelow<GROUND+10){
      var dist=Math.max(0,groundBelow-(p.y+ph()));
      var shScale=Math.max(0.3,1-dist/200);
      ctx.save();
      ctx.globalAlpha=0.25*shScale;
      ctx.fillStyle='#000';
      ctxEllipse(ctx,shX,groundBelow-2,pw()*0.55*shScale,4*shScale,0,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
  })();

  // スカッシュ＆ストレッチ（ジャンプで縦伸び・着地で縦潰れ）
  var sq=p.squash||0;
  var scaleX=1-sq*0.25, scaleY=1+sq*0.3;
  if(sq!==0){
    ctx.save();
    var feetX=(p.x+pw()/2)-cam, feetY=p.y+ph();
    ctx.translate(feetX,feetY);
    ctx.scale(scaleX,scaleY);
    ctx.translate(-feetX,-feetY);
    drawStick(feetX,feetY,p.dir,p.st,p.af,p.ifrm,p.skillLv,p.atkT,gG());
    ctx.restore();
  } else {
    // 接地ソフトシャドウ（空中では小さく薄く＝高さが伝わる）
    var pgY=getGroundY(p.x+pw()/2);
    if(pgY<H+40){
      var airH=Math.max(0,pgY-(p.y+ph()));
      var shSc=Math.max(0.35,1-airH/130);
      ctx.save();
      ctx.globalAlpha=0.28*shSc;
      ctx.fillStyle='#000';
      ctx.beginPath();
      ctxEllipse(ctx,(p.x+pw()/2)-cam,pgY-2,12*shSc,3.5*shSc,0,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
    drawStick((p.x+pw()/2)-cam,p.y+ph(),p.dir,p.st,p.af,p.ifrm,p.skillLv,p.atkT,gG());
    // ★爆弾所持中：頭上にアイコン表示
    if(p.hasBomb){
      ctx.save();
      ctx.font='15px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.shadowColor='#ffaa00'; ctx.shadowBlur=8;
      ctx.fillText('💣',(p.x+pw()/2)-cam,p.y-14+Math.sin(fr*0.2)*2);
      ctx.restore();
    }
  }
  } // end プレイヤー描画ガード

  // ── 防御成功エフェクト ──
  if(p.guardEffect>0){
    var gx=(p.x+pw()/2)-cam;
    var gy=p.y+8;
    var alpha=p.guardEffect/30;
    var scale=1+(1-alpha)*0.4; // 少し拡大しながら消える
    ctx.save();
    ctx.globalAlpha=alpha;
    // 盾の輝きリング
    ctx.strokeStyle='#aaddff';
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.arc(gx, gy, 22*scale, 0, Math.PI*2);
    ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.7)';
    ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.arc(gx, gy, 16*scale, 0, Math.PI*2);
    ctx.stroke();
    // GUARD! テキスト
    ctx.fillStyle='#aaddff';
    ctx.font='bold 11px Arial Black,sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='bottom';
    ctx.shadowColor='#00aaff';
    ctx.shadowBlur=8;
    ctx.fillText('GUARD!', gx, gy-26-p.guardEffect*0.3);
    ctx.shadowBlur=0;
    ctx.restore();
  }

  // ボス撃破後：ゴールへ誘導バナー
  if(bossClearMsg>0){
    ctx.save();
    var ba=Math.min(1,bossClearMsg/30);
    ctx.globalAlpha=ba;
    ctx.fillStyle='#ffe44d';
    ctx.font='bold 22px Arial Black,sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='#ff8800';ctx.shadowBlur=14;
    ctx.fillText('BOSS DEFEATED!', W/2, H*0.34);
    ctx.font='bold 14px Arial,sans-serif';
    ctx.fillStyle='#fff';
    ctx.fillText('ステージクリア！', W/2, H*0.44);
    ctx.shadowBlur=0;
    ctx.restore();
  }

  // 無敵シールドエフェクト（金色点滅オーラ）
  if(hasSk(5) && p.invTimer>0){
    var gx2=(p.x+pw()/2)-cam, gy2=p.y+ph()/2;
    ctx.save();
    ctx.globalAlpha=(0.3+Math.sin(fr*0.3)*0.2);
    ctx.strokeStyle='#ffe44d'; ctx.lineWidth=4;
    ctx.shadowColor='#ffe44d'; ctx.shadowBlur=20;
    ctx.beginPath(); ctx.arc(gx2,gy2,32,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=0.08;
    ctx.fillStyle='#ffe44d';
    ctx.beginPath(); ctx.arc(gx2,gy2,32,0,Math.PI*2); ctx.fill();
    // 残り時間表示
    ctx.globalAlpha=0.9; ctx.fillStyle='#ffe44d';
    ctx.font='bold 9px monospace'; ctx.textAlign='center';
    ctx.fillText(Math.ceil(p.invTimer/60)+'s', gx2, gy2-38);
    ctx.restore();
  }


  // 巨大レーザー発射エフェクト
  if(p.megaLaserActive){
    var ly=p.y+ph()*0.35;
    var lx=(p.x+pw()/2)-cam;
    var lEndX=p.dir>0?W+50:-50;
    ctx.save();
    ctx.globalAlpha=0.9;
    // コア
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=6;
    ctx.shadowColor='#00eeff'; ctx.shadowBlur=30;
    ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(lEndX,ly); ctx.stroke();
    // グロー
    ctx.strokeStyle='#00eeff'; ctx.lineWidth=18;
    ctx.globalAlpha=0.35;
    ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(lEndX,ly); ctx.stroke();
    // 外縁
    ctx.strokeStyle='#aaeeff'; ctx.lineWidth=2;
    ctx.globalAlpha=0.7;
    ctx.beginPath(); ctx.moveTo(lx,ly-9); ctx.lineTo(lEndX,ly-9); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(lx,ly+9); ctx.lineTo(lEndX,ly+9); ctx.stroke();
    ctx.restore();
  }

  // 防御エフェクト
  if(gG()&&gs==='play'&&hasSk(1)){
    var gx=(p.x+pw()/2)-cam, gy=p.y+ph()/2;
    if(hasSk(5)&&p.invTimer>0){
      // 無敵モード：バリア（緑の輪）
      ctx.save();
      ctx.globalAlpha=0.35+Math.sin(fr*0.2)*0.15;
      ctx.strokeStyle='#50dc78'; ctx.lineWidth=3;
      ctx.shadowColor='#50dc78'; ctx.shadowBlur=15;
      ctx.beginPath();ctx.arc(gx,gy,28,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=0.08; ctx.fillStyle='#50dc78';
      ctx.beginPath();ctx.arc(gx,gy,28,0,Math.PI*2);ctx.fill();
      ctx.restore();
    } else {
      // 盾構えエフェクト：盾の周囲に小さな火花
      ctx.save();
      ctx.globalAlpha=0.7;
      for(var si2=0;si2<4;si2++){
        var sa=fr*0.15+si2*Math.PI/2;
        var sr=18;
        ctx.fillStyle='#88aaff';
        ctx.beginPath();ctx.arc(gx+Math.cos(sa)*sr,gy+Math.sin(sa)*sr,2,0,Math.PI*2);ctx.fill();
      }
      ctx.restore();
    }
  }

  // 被ダメ赤フラッシュ（画面端ビネット）
  if(dmgFlash>0){
    dmgFlash--;
    var fa=(dmgFlash/16)*0.4;
    var vg=ctx.createRadialGradient(W/2,H/2,H*0.35,W/2,H/2,H*0.75);
    vg.addColorStop(0,'rgba(255,0,0,0)');
    vg.addColorStop(1,'rgba(255,30,30,'+fa.toFixed(3)+')');
    ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  }

  // コンボカウンター（2連続以上で画面上部に表示）
  if(combo>=2 && gs==='play'){
    var cps=1+Math.min(0.3,(comboT>220?(comboT-220)*0.02:0)); // 加算直後パルス
    ctx.save();
    ctx.translate(W/2,34); ctx.scale(cps,cps);
    ctx.font='bold 17px Arial'; ctx.textAlign='center';
    ctx.lineWidth=4; ctx.strokeStyle='rgba(0,0,0,0.65)';
    ctx.strokeText('×'+combo+' COMBO!',0,0);
    ctx.fillStyle=combo>=5?'#ff44ff':'#ffe44d';
    ctx.fillText('×'+combo+' COMBO!',0,0);
    // 残り時間バー
    ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(-40,6,80,4);
    ctx.fillStyle=combo>=5?'#ff44ff':'#ffe44d';
    ctx.fillRect(-40,6,80*(comboT/240),4);
    ctx.restore();
  }

  // ポーズ画面はHTMLメニュー(showPauseMenu)で表示

  // スキャンライン
  ctx.fillStyle='rgba(0,0,0,.03)';
  for(var y=0;y<H;y+=4)ctx.fillRect(0,y,W,1);

  ctx.restore(); // カメラシェイク終了
}

// ===== ループ（固定60fpsタイムステップ：120Hz端末でも速度一定） =====
var _lastT=0,_acc=0,_STEP=1000/60;
var _errShown=false;
function showErr(where,e){
  if(_errShown)return; _errShown=true;
  var msg=(e&&e.message)?e.message:String(e);
  var ln=(e&&e.stack)?(e.stack.split('\n')[1]||''):'';
  mkBanner('⚠ '+where+': '+msg+'\n'+ln);
}
function loop(ts){
  if(!ts)ts=performance.now();
  if(!_lastT)_lastT=ts;
  var dt=ts-_lastT; _lastT=ts;
  if(dt>100)dt=100; // タブ復帰時の暴走防止
  _acc+=dt;
  try{
    while(_acc>=_STEP){ update(); _acc-=_STEP; }
  }catch(eU){ showErr('update',eU); }
  try{
    draw();
  }catch(eD){ showErr('draw',eD); }
  // ボタン状態（変化した時だけclassListを更新＝毎フレーム操作で.actが中断されるのを防ぐ）
  var blas=document.getElementById('blas');
  if(blas){
    // 盾ボタン：スキル取得(LV3+)で光って使用可能に
    var bgBtn=document.getElementById('bg');
    if(bgBtn){
      var bgState=hasSk(3)?'ready':'cd';
      if(_btnState.bg!==bgState){
        _btnState.bg=bgState;
        bgBtn.classList.remove('guard-ready','guard-cd');
        bgBtn.classList.add(bgState==='ready'?'guard-ready':'guard-cd');
        if(bgState==='ready') bgBtn.classList.add('skill-on'); else bgBtn.classList.remove('skill-on');
      }
    }
    // レーザーボタン：状態を文字列化して変化時のみ更新
    var lasState='none';
    if(p.hasBomb){ lasState='ready'; }        // ★爆弾所持中は投擲ボタンとして点灯
    else if(hasSk(4) || p.trait==='laser'){
      var canFire=p.laserUses>0 && p.laserCD<=0 && !p.megaLaserActive;
      lasState=canFire?'ready':'cd';
    }
    if(_btnState.blas!==lasState){
      _btnState.blas=lasState;
      blas.classList.remove('laser-ready','laser-cd');
      if(lasState==='none'){
        blas.classList.remove('skill-on');
      } else {
        blas.classList.add('skill-on');
        blas.classList.add(lasState==='ready'?'laser-ready':'laser-cd');
      }
    }
    // 残回数バッジ：爆弾所持中は💣、それ以外はレーザー残数
    var badge=blas.querySelector('.badge');
    if(badge){ badge.textContent = p.hasBomb ? '💣' : ((hasSk(4)||p.trait==='laser') ? (p.laserUses>0?String(p.laserUses):'✕') : ''); }
    // ジャンプボタン：2段ジャンプ(LV1+)
    var bjBtn=document.getElementById('bj');
    if(bjBtn){
      var bjOn=hasSk(1);
      if(_btnState.bj!==bjOn){ _btnState.bj=bjOn; if(bjOn)bjBtn.classList.add('skill-on');else bjBtn.classList.remove('skill-on'); }
    }
    // 攻撃ボタン：ソード(LV2+)
    var baBtn=document.getElementById('ba');
    if(baBtn){
      var baOn=hasSk(2);
      if(_btnState.ba!==baOn){ _btnState.ba=baOn; if(baOn)baBtn.classList.add('skill-on');else baBtn.classList.remove('skill-on'); }
    }
    // ★飛行 上下ボタン：飛行可能/飛行中は左右と同じ濃さ、それ以外は薄暗く
    var _flyDur=hasPerk('flight5')?360:(p.trait==='fly2'?180:0);
    var flyLit=(_flyDur>0 && (p.flying || (p.flyUses||0)>0));
    if(_btnState.bu!==flyLit){
      _btnState.bu=flyLit;
      var buBtn=document.getElementById('bu'), bdBtn=document.getElementById('bd');
      if(buBtn){ if(flyLit)buBtn.classList.add('fly-on');else buBtn.classList.remove('fly-on'); }
      if(bdBtn){ if(flyLit)bdBtn.classList.add('fly-on');else bdBtn.classList.remove('fly-on'); }
    }
  }
  requestAnimationFrame(loop);
}

// ov上のタップ分岐（fell時はrestartStage）
ov.addEventListener('touchstart',function(e){
  // ★スクロール可能な画面(ステージ選択/ランキング/ショップ)では
  //   preventDefaultするとネイティブ縦スクロールが死ぬので呼ばない（⑤の原因）。
  if(!ov.classList.contains('scrollable')) e.preventDefault();
  sndInit();
  if(gs==='fell'){restartStage();}
  else if(gs==='levelup'){gs='play';ov.style.display='none';bgmRestart();}
  else if(gs==='charSelect'){ /* ステップ内ボタンで管理 */ }
  else if(gs==='ranking'){ /* ランキング画面は戻るボタンで管理 */ }
  else if(gs==='story'){ advanceStory(); }
  else if(gs==='tutorial'){ advanceTutorial(); }
  else if(gs==='title'){ if(!seenStory){showStory();}else{SELECT_STEP=1;showCharSelect();} }
  else if(gs==='dead'||gs==='clear'){ gs='title'; showTitleScreen(); }
  else if(gs==='skillpick'){ /* スキル選択ボタンで管理 */ }
  else if(gs!=='play'){doStart();}
},{passive:false});
ov.addEventListener('click',function(e){
  sndInit();
  if(gs==='fell'){restartStage();}
  else if(gs==='levelup'){gs='play';ov.style.display='none';bgmRestart();}
  else if(gs==='charSelect'){ /* ステップ内ボタンで管理 */ }
  else if(gs==='ranking'){ /* ランキング画面は戻るボタンで管理 */ }
  else if(gs==='story'){ advanceStory(); }
  else if(gs==='tutorial'){ advanceTutorial(); }
  else if(gs==='title'){ if(!seenStory){showStory();}else{SELECT_STEP=1;showCharSelect();} }
  else if(gs==='dead'||gs==='clear'){ gs='title'; showTitleScreen(); }
  else if(gs==='skillpick'){ /* スキル選択ボタンで管理 */ }
  else if(gs!=='play'){doStart();}
});

  gs='story';

    +'<div style="color:#fff;font-size:16px;line-height:1.7;font-weight:bold;white-space:pre-line;max-width:300px;margin-bottom:24px">'+pg.text+'</div>'

  }

    +'<div class="press" style="font-size:13px">▶ タップで'+(storyPage<STORY_PAGES.length-1?'つづき':'勇者を選ぶ')+' ◀</div>'

  SELECT_STEP=1; showCharSelect();
}

          +'<div style="line-height:1;margin-top:1px">'+starStr+'</div>';

        +content+'</div>';

      (function(cell){
        if(cell.dataset.unlocked!=='1') return;
        // ★タップ vs スクロール判定：touchstartで即選択するとドラッグでスクロール
        //   できないので、指の移動量が小さい時だけ「タップ」として選択する（⑤）。
        var sx=0, sy=0, moved=false;
        cell.addEventListener('touchstart',function(e){
          var t=e.touches[0]; sx=t.clientX; sy=t.clientY; moved=false;
          // ここではpreventDefaultしない＝スクロールを生かす
        },{passive:true});
        cell.addEventListener('touchmove',function(e){
          var t=e.touches[0];
          if(Math.abs(t.clientX-sx)>8 || Math.abs(t.clientY-sy)>8) moved=true;
        },{passive:true});
        cell.addEventListener('touchend',function(e){
          if(moved) return;            // スクロール操作だったので無視
          e.stopPropagation();
          selectedStage=parseInt(cell.dataset.stage,10);
          startStageFromMap(selectedStage);
        });
        // デスクトップ用クリック
        cell.addEventListener('click',function(e){
          e.stopPropagation();
          selectedStage=parseInt(cell.dataset.stage,10);
          startStageFromMap(selectedStage);
        });
      })(cells[i]);
    }
    var bb=document.getElementById('mapBackBtn');
    if(bb){
      function back(e){ e.stopPropagation(); if(e.cancelable)e.preventDefault(); ov.classList.remove('scrollable'); gs='title'; showTitleScreen(); }
      bb.addEventListener('touchstart',back,{passive:false});
      bb.addEventListener('click',back);
    }
  },30);
}

      else { pLabel=pk.price+'G'; pColor='#777'; }
      h+='<div style="display:flex;align-items:center;gap:10px;background:'+(pHave?'rgba(76,175,80,0.16)':'rgba(255,255,255,0.05)')+';border:1px solid '+(pHave?'rgba(76,175,80,0.5)':'rgba(255,255,255,0.12)')+';border-radius:9px;padding:8px 11px">'
        +'<span style="font-size:22px">'+pk.icon+'</span>'
        +'<span style="flex:1;text-align:left;color:#fff;font-size:12px;font-weight:bold">'+pk.name+'<br><span style="font-size:10px;color:#bbb;font-weight:normal">'+pk.desc+'</span></span>'
        +'<span id="shopPerk_'+pk.id+'" data-id="'+pk.id+'" data-price="'+pk.price+'" style="color:#fff;background:'+pColor+';font-size:11px;font-weight:bold;padding:5px 12px;border-radius:6px;cursor:pointer;white-space:nowrap">'+pLabel+'</span>'
        +'</div>';
    }
    h+='</div>'
      +'<div id="shopBackBtn" style="color:#fff;font-size:13px;font-weight:bold;cursor:pointer;border:1.5px solid rgba(255,255,255,0.3);border-radius:8px;padding:8px 20px">◀ 戻る</div>';
    ov.innerHTML=h;
    ov.style.display='flex';
    setTimeout(function(){
      function tapEv(el,fn){ if(!el)return; el.addEventListener('touchstart',function(e){e.stopPropagation();if(e.cancelable)e.preventDefault();fn();},{passive:false}); el.addEventListener('click',function(e){e.stopPropagation();fn();}); }
      tapEv(document.getElementById('shopTabSK'),function(){ showShop('skill'); });
      tapEv(document.getElementById('shopTabSW'),function(){ showShop('sword'); });
      tapEv(document.getElementById('shopTabOF'),function(){ showShop('outfit'); });
      tapEv(document.getElementById('shopTabSH'),function(){ showShop('shield'); });
      tapEv(document.getElementById('shopBackBtn'),function(){ showTitleScreen(); });
      for(var i=0;i<SKILL_SHOP.length;i++){
        (function(sk){
          var btn=document.getElementById('shopSk_'+sk.lv);
          if(!btn) return;
          tapEv(btn,function(){
            var r=buySkillLv(sk.lv,sk.price);
            if(r==='ok'){ SFX.skillup&&SFX.skillup(); showShop('skill'); }
            else if(r==='poor'){ btn.textContent='G不足'; btn.style.background='#cc4444'; }
          });
        })(SKILL_SHOP[i]);
      }
      for(var pi=0;pi<PERK_SHOP.length;pi++){
        (function(pk){
          var pbtn=document.getElementById('shopPerk_'+pk.id);
          if(!pbtn) return;
          tapEv(pbtn,function(){
            var r=buyPerk(pk.id,pk.price);
            if(r==='ok'){ SFX.skillup&&SFX.skillup(); showShop('skill'); }
            else if(r==='poor'){ pbtn.textContent='G不足'; pbtn.style.background='#cc4444'; }
          });
        })(PERK_SHOP[pi]);
      }
    },30);
    return;
  }
  var items, kind, equipped;
  if(tab==='sword'){ items=SWORD_SKINS; kind='sword'; equipped=equippedSword; }
  else if(tab==='outfit'){ items=OUTFIT_SKINS; kind='outfit'; equipped=equippedOutfit; }
  else { items=SHIELD_SKINS; kind='shield'; equipped=equippedShield; }
  h+='<div style="display:flex;flex-direction:column;gap:6px;width:100%;max-width:320px;margin-bottom:16px;max-height:42vh;overflow-y:auto">';
  for(var i=0;i<items.length;i++){
    var it=items[i];
    var owned=ownedItems.indexOf(it.id)>=0;
    var isEq=(equipped===it.id);
    var btnLabel, btnColor, btnId='shopAct_'+it.id;
    if(isEq){ btnLabel='装備中'; btnColor='#4caf50'; }
    else if(owned){ btnLabel='装備する'; btnColor='#2a9fd8'; }
    else if(totalGold>=it.price){ btnLabel=it.price+'G'; btnColor='#ffaa22'; }
    else { btnLabel=it.price+'G'; btnColor='#777'; }
    h+='<div style="display:flex;align-items:center;gap:10px;background:'+(isEq?'rgba(76,175,80,0.16)':'rgba(255,255,255,0.05)')+';border:1px solid '+(isEq?'rgba(76,175,80,0.5)':'rgba(255,255,255,0.12)')+';border-radius:9px;padding:8px 11px">'
      +'<span style="font-size:24px">'+it.icon+'</span>'
      +'<span style="flex:1;text-align:left;color:#fff;font-size:13px;font-weight:bold">'+it.name+'</span>'
      +'<span id="'+btnId+'" data-id="'+it.id+'" data-price="'+it.price+'" data-owned="'+(owned?1:0)+'" data-eq="'+(isEq?1:0)+'" style="color:#fff;background:'+btnColor+';font-size:11px;font-weight:bold;padding:5px 12px;border-radius:6px;cursor:pointer;white-space:nowrap">'+btnLabel+'</span>'
      +'</div>';
  }
  h+='</div>'
    +'<div id="shopBackBtn" style="color:#fff;font-size:13px;font-weight:bold;cursor:pointer;border:1.5px solid rgba(255,255,255,0.3);border-radius:8px;padding:8px 20px">◀ 戻る</div>';
  ov.innerHTML=h;
  ov.style.display='flex';
  setTimeout(function(){
    // タブ切り替え
    function tapEv(el,fn){ if(!el)return; el.addEventListener('touchstart',function(e){e.stopPropagation();if(e.cancelable)e.preventDefault();fn();},{passive:false}); el.addEventListener('click',function(e){e.stopPropagation();fn();}); }
    tapEv(document.getElementById('shopTabSK'),function(){ showShop('skill'); });
    tapEv(document.getElementById('shopTabSW'),function(){ showShop('sword'); });
    tapEv(document.getElementById('shopTabOF'),function(){ showShop('outfit'); });
    tapEv(document.getElementById('shopTabSH'),function(){ showShop('shield'); });
    tapEv(document.getElementById('shopBackBtn'),function(){ showTitleScreen(); });
    // 各アイテムの購入/装備ボタン
    for(var i=0;i<items.length;i++){
      (function(it){
        var btn=document.getElementById('shopAct_'+it.id);
        if(!btn) return;
        tapEv(btn,function(){
          var owned=ownedItems.indexOf(it.id)>=0;
          if(equipped===it.id) return; // 装備中は何もしない
          if(owned){
            equipItem(it.id,kind); SFX.coin&&SFX.coin(); showShop(tab); // 装備して再描画
          } else {
            var r=buyItem(it.id,it.price);
            if(r==='ok'){ equipItem(it.id,kind); SFX.skillup&&SFX.skillup(); showShop(tab); }
            else if(r==='poor'){ btn.textContent='G不足'; btn.style.background='#cc4444'; }
          }
        });
      })(items[i]);
    }
  },30);
}
var _lastPauseT=0;
function togglePause(){
  var n=Date.now();
  if(n-_lastPauseT<350) return; // touchstart+click二重発火ガード
  _lastPauseT=n;
  if(gs==='play'){ gs='paused'; bgmStop(); showPauseMenu(); }
  else if(gs==='paused'){ gs='play'; hidePauseMenu(); bgmStart(); }
}
// ポーズメニュー（再開＋ホームに戻る）
function showPauseMenu(){
  ov.innerHTML='<div style="font-size:30px;font-weight:bold;color:#fff;letter-spacing:2px;margin-bottom:6px">⏸ PAUSED</div>'
    +'<div style="color:#bbb;font-size:13px;margin-bottom:24px">下のボタンで操作</div>'
    +'<div id="pauseResume" style="color:#222;background:#ffd24a;font-size:15px;font-weight:bold;cursor:pointer;border-radius:10px;padding:11px 32px;margin-bottom:12px">▶ 再開する</div>'
    +'<div id="pauseHome" style="color:#ff5555;font-size:14px;font-weight:bold;cursor:pointer;border:1.5px solid rgba(255,85,85,0.6);border-radius:10px;padding:9px 26px;background:rgba(255,85,85,0.08)">🏠 ホームに戻る</div>';
  ov.style.display='flex';
  setTimeout(function(){
    var rb=document.getElementById('pauseResume');
    if(rb){
      function resume(e){ e.stopPropagation(); if(e.cancelable)e.preventDefault(); togglePause(); }
      rb.addEventListener('touchstart',resume,{passive:false});
      rb.addEventListener('click',resume);
    }
    var hb=document.getElementById('pauseHome');
    if(hb){
      function home(e){ e.stopPropagation(); if(e.cancelable)e.preventDefault(); confirmHome(); }
      hb.addEventListener('touchstart',home,{passive:false});
      hb.addEventListener('click',home);
    }
  },30);
}
function hidePauseMenu(){ ov.style.display='none'; ov.innerHTML=''; }
// ホームに戻る確認ダイアログ
function confirmHome(){
  ov.innerHTML='<div style="font-size:34px;margin-bottom:14px">🏠</div>'
    +'<div style="color:#fff;font-size:16px;font-weight:bold;line-height:1.6;margin-bottom:8px">ホームに戻りますか？</div>'
    +'<div style="color:#ff9999;font-size:12px;margin-bottom:24px;max-width:280px;line-height:1.5">いまのプレイは終了します。<br>スコアやコインは記録されません。</div>'
    +'<div id="homeYes" style="color:#fff;background:#d83838;font-size:15px;font-weight:bold;cursor:pointer;border-radius:10px;padding:11px 32px;margin-bottom:12px">🏠 ホームに戻る</div>'
    +'<div id="homeNo" style="color:#fff;font-size:14px;font-weight:bold;cursor:pointer;border:1.5px solid rgba(255,255,255,0.3);border-radius:10px;padding:9px 30px">◀ つづける</div>';
  ov.style.display='flex';
  setTimeout(function(){
    var yes=document.getElementById('homeYes');
    if(yes){
      function goHome(e){ e.stopPropagation(); if(e.cancelable)e.preventDefault(); bgmStop(); gs='title'; showTitleScreen(); }
      yes.addEventListener('touchstart',goHome,{passive:false});
      yes.addEventListener('click',goHome);
    }
    var no=document.getElementById('homeNo');
    if(no){
      function back(e){ e.stopPropagation(); if(e.cancelable)e.preventDefault(); showPauseMenu(); }
      no.addEventListener('touchstart',back,{passive:false});
      no.addEventListener('click',back);
    }
  },30);
}
var hPauseBtn=document.getElementById('hPause');
if(hPauseBtn){
  hPauseBtn.addEventListener('touchstart',function(e){e.preventDefault();togglePause();},{passive:false});
  hPauseBtn.addEventListener('click',function(e){togglePause();});
}
// ポーズ中はHTMLメニューのボタンで操作（キャンバスタップでの再開は無効）
cv.addEventListener('touchstart',function(e){
  if(gs==='paused'){ e.preventDefault(); }
},{passive:false});

loop();
}catch(__bootErr){
  try{ mkBanner('⚠ 起動エラー: '+(__bootErr&&__bootErr.message?__bootErr.message:String(__bootErr))+'\n'+((__bootErr&&__bootErr.stack)?__bootErr.stack.split('\n').slice(1,3).join('\n'):'')); }catch(_){}
}
})();
</script>
